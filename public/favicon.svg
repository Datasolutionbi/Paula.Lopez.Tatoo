<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dynamic Data Favicon -->
  <rect width="32" height="32" rx="8" fill="#080813"/>
  <path d="M8 22V16" stroke="#3B82F6" stroke-width="3" stroke-linecap="round">
    <animate attributeName="d" values="M8 22V16;M8 22V12;M8 22V16" dur="2s" repeatCount="indefinite" />
  </path>
  <path d="M16 22V10" stroke="#22D3EE" stroke-width="3" stroke-linecap="round">
    <animate attributeName="d" values="M16 22V10;M16 22V14;M16 22V10" dur="2.5s" repeatCount="indefinite" />
  </path>
  <path d="M24 22V18" stroke="#3B82F6" stroke-width="3" stroke-linecap="round">
    <animate attributeName="d" values="M24 22V18;M24 22V14;M24 22V18" dur="1.8s" repeatCount="indefinite" />
  </path>
  <circle cx="16" cy="16" r="1.5" fill="#FFF">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
