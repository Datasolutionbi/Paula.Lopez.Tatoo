<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="nexus-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="20%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#080813" />
    </radialGradient>
  </defs>

  <!-- Fondo con Profundidad -->
  <circle cx="256" cy="256" r="256" fill="url(#bg-grad)"/>
  

  <!-- Anillo Orbital Nexus -->
  <circle cx="256" cy="256" r="220" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.1" />


  <!-- Barras de Crecimiento Ultra-Bold (Cálculo exacto para centrado) -->
  <!-- Cada barra tiene 80px de ancho. Espacio entre ellas: 20px. Total: 380px -->
  <!-- Centrado: (512 - 380) / 2 = 66px de margen a cada lado -->
  
  <!-- Barra 1 (Pequeña) -->
  <path d="M106 360V330" stroke="#3B82F6" stroke-width="60" stroke-linecap="round" />
  
  <!-- Barra 2 (Mediana) -->
  <path d="M206 360V260" stroke="#22D3EE" stroke-width="60" stroke-linecap="round" />
  
  <!-- Barra 3 (Grande) -->
  <path d="M306 360V190" stroke="#3B82F6" stroke-width="60" stroke-linecap="round" />
  
</svg>
