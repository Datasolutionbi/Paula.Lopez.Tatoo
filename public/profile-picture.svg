<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Filtro de Resplandor -->
    <filter id="nexus-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <!-- Gradiente de Fondo -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#080813" />
    </radialGradient>
  </defs>

  <!-- Fondo con Profundidad -->
  <circle cx="256" cy="256" r="256" fill="url(#bg-grad)"/>
  
  <!-- Anillo Orbital Nexus -->
  <circle cx="256" cy="256" r="220" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="10 20" />
  
  <!-- Fotón de Inteligencia -->
  <circle cx="411" cy="101" r="6" fill="#22D3EE" filter="url(#nexus-glow)" />

  <!-- Barras de Crecimiento Ultra-Bold -->
  <path d="M150 360V310" stroke="#3B82F6" stroke-width="85" stroke-linecap="round" opacity="0.4"/>
  <path d="M256 360V230" stroke="#22D3EE" stroke-width="85" stroke-linecap="round" />
  <path d="M362 360V150" stroke="#3B82F6" stroke-width="85" stroke-linecap="round" filter="url(#nexus-glow)" />

  <!-- Núcleo de Procesamiento -->
  <circle cx="256" cy="256" r="6" fill="white" opacity="0.2"/>
</svg>
