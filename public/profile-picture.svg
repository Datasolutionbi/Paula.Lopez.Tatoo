<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Circular Profile Background -->
  <circle cx="256" cy="256" r="256" fill="#080813"/>
  
  <!-- Subtle Outer Ring -->
  <circle cx="256" cy="256" r="240" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.1"/>

  <!-- Ultra-Bold Growth Bars (Centered and Scaled for Profile) -->
  <!-- Left Bar (Smallest) -->
  <path d="M150 360V320" stroke="#3B82F6" stroke-width="80" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Middle Bar (Medium) -->
  <path d="M256 360V240" stroke="#22D3EE" stroke-width="80" stroke-linecap="round"/>
  
  <!-- Right Bar (Tallest) -->
  <path d="M362 360V160" stroke="#3B82F6" stroke-width="80" stroke-linecap="round"/>

  <!-- Central Highlight Node -->
  <circle cx="256" cy="256" r="8" fill="white" opacity="0.1"/>
</svg>
