<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="nexus-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#080813" />
    </radialGradient>
  </defs>

  <!-- Fondo con Profundidad -->
  <circle cx="256" cy="256" r="256" fill="url(#bg-grad)"/>
  
  <!-- Red Neuronal Sutil (Textura de fondo) -->
  <g stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.15">
    <line x1="100" y1="100" x2="256" y2="256" />
    <line x1="412" y1="100" x2="256" y2="256" />
    <line x1="100" y1="412" x2="256" y2="256" />
    <line x1="412" y1="412" x2="256" y2="256" />
    <circle cx="100" cy="100" r="2" fill="#3B82F6" fill-opacity="0.2" />
    <circle cx="412" cy="100" r="2" fill="#3B82F6" fill-opacity="0.2" />
    <circle cx="100" cy="412" r="2" fill="#3B82F6" fill-opacity="0.2" />
    <circle cx="412" cy="412" r="2" fill="#3B82F6" fill-opacity="0.2" />
  </g>

  <!-- Anillo Orbital Nexus -->
  <circle cx="256" cy="256" r="220" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.1" stroke-dasharray="5 15" />
  
  <!-- Fotón de Inteligencia -->
  <circle cx="256" cy="36" r="6" fill="#22D3EE" filter="url(#nexus-glow)" />

  <!-- Barras de Crecimiento Ultra-Bold (Perfectamente Centradas) -->
  <!-- Ancho total: 410px (4 barras de 80px + 3 gaps de 30px) -->
  <!-- Inicio en X: (512 - 410) / 2 + 40 = 91 -->
  <path d="M91 360V330" stroke="#3B82F6" stroke-width="80" stroke-linecap="round" opacity="0.3"/>
  <path d="M201 360V260" stroke="#22D3EE" stroke-width="80" stroke-linecap="round" opacity="0.6"/>
  <path d="M311 360V190" stroke="#3B82F6" stroke-width="80" stroke-linecap="round" />
  <path d="M421 360V100" stroke="#22D3EE" stroke-width="80" stroke-linecap="round" filter="url(#nexus-glow)" />
</svg>
