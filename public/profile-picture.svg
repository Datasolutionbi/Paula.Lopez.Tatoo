<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="nexus-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#080813" />
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <circle cx="256" cy="256" r="256" fill="url(#bg-grad)"/>
  
  <!-- Red Neuronal Sutil (Textura de fondo) -->
  <g stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.15">
    <line x1="100" y1="100" x2="256" y2="256" />
    <line x1="412" y1="100" x2="256" y2="256" />
    <line x1="100" y1="412" x2="256" y2="256" />
    <line x1="412" y1="412" x2="256" y2="256" />
    <circle cx="100" cy="100" r="2" fill="#3B82F6" fill-opacity="0.2" />
    <circle cx="412" cy="100" r="2" fill="#3B82F6" fill-opacity="0.2" />
    <circle cx="100" cy="412" r="2" fill="#3B82F6" fill-opacity="0.2" />
    <circle cx="412" cy="412" r="2" fill="#3B82F6" fill-opacity="0.2" />
  </g>

  <!-- Anillo Orbital -->
  <circle cx="256" cy="256" r="220" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.1" stroke-dasharray="5 15" />
  
  <!-- Fotón (Movido para no solapar con la barra 4) -->
  <circle cx="101" cy="101" r="6" fill="#22D3EE" filter="url(#nexus-glow)" />

  <!-- Barras de Crecimiento (4 barras redistribuidas) -->
  <!-- Barra 1 -->
  <path d="M105 360V320" stroke="#3B82F6" stroke-width="75" stroke-linecap="round" opacity="0.3"/>
  <!-- Barra 2 -->
  <path d="M206 360V250" stroke="#22D3EE" stroke-width="75" stroke-linecap="round" opacity="0.6"/>
  <!-- Barra 3 -->
  <path d="M307 360V180" stroke="#3B82F6" stroke-width="75" stroke-linecap="round" />
  <!-- Barra 4 (La meta de crecimiento) -->
  <path d="M408 360V100" stroke="#22D3EE" stroke-width="75" stroke-linecap="round" filter="url(#nexus-glow)" />
</svg>
