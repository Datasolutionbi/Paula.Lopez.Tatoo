<svg width="3840" height="2160" viewBox="0 0 3840 2160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg_grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0D0D1F"/>
      <stop offset="100%" stop-color="#080813"/>
    </radialGradient>
    <filter id="node_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="3840" height="2160" fill="url(#bg_grad)"/>
  
  <!-- Ambient Orbs -->
  <circle cx="1000" cy="500" r="1500" fill="#3B82F6" fill-opacity="0.05"/>
  <circle cx="2800" cy="1600" r="1500" fill="#22D3EE" fill-opacity="0.05"/>

  <!-- Dense Neural Network -->
  <g stroke="#3B82F6" stroke-width="0.8" stroke-opacity="0.2">
    <!-- Generation of multiple clusters -->
    <path d="M400 200 L800 400 L600 700 L300 500 Z" fill="none"/>
    <path d="M800 400 L1200 300 L1400 600 L1000 800 L800 400" fill="none"/>
    <path d="M1400 600 L1800 500 L2000 900 L1600 1100 L1400 600" fill="none"/>
    <path d="M2000 900 L2400 800 L2600 1200 L2200 1400 L2000 900" fill="none"/>
    <path d="M2600 1200 L3000 1100 L3200 1500 L2800 1700 L2600 1200" fill="none"/>
    <path d="M3200 1500 L3600 1400 L3800 1800 L3400 2000 L3200 1500" fill="none"/>
    
    <!-- Cross Connections -->
    <line x1="800" y1="400" x2="1400" y2="600" />
    <line x1="1400" y1="600" x2="2600" y2="1200" />
    <line x1="2000" y1="900" x2="3200" y2="1500" />
    <line x1="600" y1="700" x2="1000" y2="800" />
    <line x1="1000" y1="800" x2="1600" y2="1100" />
    <line x1="1600" y1="1100" x2="2200" y2="1400" />
    <line x1="2200" y1="1400" x2="2800" y2="1700" />
  </g>

  <!-- High Density Nodes -->
  <g fill="#22D3EE" filter="url(#node_glow)">
    <circle cx="400" cy="200" r="4"/><circle cx="800" cy="400" r="6"/><circle cx="600" cy="700" r="4"/><circle cx="300" cy="500" r="3"/>
    <circle cx="1200" cy="300" r="5"/><circle cx="1400" cy="600" r="7"/><circle cx="1000" cy="800" r="4"/>
    <circle cx="1800" cy="500" r="5"/><circle cx="2000" cy="900" r="8"/><circle cx="1600" cy="1100" r="4"/>
    <circle cx="2400" cy="800" r="5"/><circle cx="2600" cy="1200" r="7"/><circle cx="2200" cy="1400" r="4"/>
    <circle cx="3000" cy="1100" r="5"/><circle cx="3200" cy="1500" r="8"/><circle cx="2800" cy="1700" r="4"/>
    <circle cx="3600" cy="1400" r="5"/><circle cx="3800" cy="1800" r="7"/><circle cx="3400" cy="2000" r="4"/>
  </g>
</svg>
