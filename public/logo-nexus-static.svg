<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring_grad_static" x1="128" y1="128" x2="384" y2="384" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6" stop-opacity="0.6" />
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0.3" />
    </linearGradient>
    <filter id="glow_static">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="240" fill="#080813" />
  
  <!-- Glassmorphism Ring -->
  <rect x="128" y="128" width="256" height="256" rx="40" transform="rotate(45 256 256)" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.2" />
  <rect x="135" y="135" width="242" height="242" rx="38" transform="rotate(45 256 256)" stroke="url(#ring_grad_static)" stroke-width="6" />

  <!-- Static Growth Bars (Left to Right Growth) -->
  <!-- Left Bar (Small) -->
  <path d="M200 320V280" stroke="#3B82F6" stroke-width="20" stroke-linecap="round" opacity="0.6" />
  
  <!-- Middle Bar (Medium) -->
  <path d="M256 320V230" stroke="#22D3EE" stroke-width="20" stroke-linecap="round" />
  
  <!-- Right Bar (Tall - Target Growth) -->
  <path d="M312 320V180" stroke="#3B82F6" stroke-width="20" stroke-linecap="round" filter="url(#glow_static)" />

  <!-- Orbital Path -->
  <circle cx="256" cy="256" r="180" stroke="white" stroke-opacity="0.05" stroke-width="1.5" stroke-dasharray="5 15" />
  
  <!-- Static Photon (Positioned at the top of the orbit) -->
  <g>
    <circle cx="256" cy="76" r="6" fill="#22D3EE" filter="url(#glow_static)" />
    <circle cx="256" cy="76" r="10" fill="#22D3EE" opacity="0.2" />
  </g>

  <!-- Central Processing Node -->
  <circle cx="256" cy="256" r="10" fill="#22D3EE" filter="url(#glow_static)" />
</svg>
