<svg width="3840" height="2160" viewBox="0 0 3840 2160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient Deep -->
    <radialGradient id="bg_grad_4k" cx="50%" cy="50%" r="70%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D0D1F"/>
      <stop offset="100%" stop-color="#080813"/>
    </radialGradient>

    <!-- Synaptic Glow Filter for the "Growth" climax -->
    <filter id="final_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Ambient Glow Orbs -->
    <radialGradient id="orb_nexus" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Layer 0: Deep Base -->
  <rect width="3840" height="2160" fill="url(#bg_grad_4k)"/>

  <!-- Layer 1: Atmospheric Glow -->
  <circle cx="1000" cy="500" r="1500" fill="url(#orb_nexus)"/>
  <circle cx="2840" cy="1660" r="1500" fill="#22D3EE" fill-opacity="0.05"/>

  <!-- Layer 2: Subtle Synaptic Texture -->
  <g stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.1">
    <circle cx="1920" cy="1080" r="1000" stroke-dasharray="10 30" />
    <circle cx="1920" cy="1080" r="1400" stroke-dasharray="5 20" />
  </g>

  <!-- Layer 3: THE GROWTH LOGO (Adapted from Favicon Design) -->
  <!-- Centered Scale: The 32x32 design scaled to 4K -->
  <!-- Block center: 1920, 1080 -->
  <g transform="translate(1920, 1080) scale(45) translate(-16, -16)">
    <!-- Bar 1 (Smallest - Nexus Blue) -->
    <path d="M9 22V20" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Bar 2 (Medium - Nexus Cyan) -->
    <path d="M16 22V15" stroke="#22D3EE" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Bar 3 (Largest - Nexus Blue with Glow) -->
    <path d="M23 22V10" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" filter="url(#final_glow)"/>
  </g>

  <!-- Layer 4: Central Tech Hub -->
  <circle cx="1920" cy="1080" r="8" fill="white" opacity="0.2"/>
</svg>
