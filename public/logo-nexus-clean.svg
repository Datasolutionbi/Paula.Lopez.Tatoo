<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring_grad_final" x1="128" y1="128" x2="384" y2="384" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6" stop-opacity="0.6" />
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0.3" />
    </linearGradient>
    <filter id="glow_final">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="240" fill="#080813" />
  
  <!-- Glassmorphism Ring -->
  <rect x="128" y="128" width="256" height="256" rx="40" transform="rotate(45 256 256)" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.2" />
  <rect x="135" y="135" width="242" height="242" rx="38" transform="rotate(45 256 256)" stroke="url(#ring_grad_final)" stroke-width="6" />

  <!-- Data Bars with Balanced Growth -->
  <!-- Left Bar -->
  <path d="M200 320V260" stroke="#3B82F6" stroke-width="20" stroke-linecap="round">
    <animate attributeName="d" values="M200 320V260;M200 320V220;M200 320V260" dur="2s" repeatCount="indefinite" />
  </path>
  
  <!-- Middle Bar (Balanced Growth) -->
  <path d="M256 320V200" stroke="#22D3EE" stroke-width="20" stroke-linecap="round">
    <animate attributeName="d" values="M256 320V200;M256 320V160;M256 320V200" dur="2.5s" repeatCount="indefinite" />
  </path>
  
  <!-- Right Bar -->
  <path d="M312 320V280" stroke="#3B82F6" stroke-width="20" stroke-linecap="round">
    <animate attributeName="d" values="M312 320V280;M312 320V230;M312 320V280" dur="1.8s" repeatCount="indefinite" />
  </path>

  <!-- Orbital Path -->
  <circle cx="256" cy="256" r="180" stroke="white" stroke-opacity="0.05" stroke-width="1.5" stroke-dasharray="5 15" />
  
  <!-- Photon (Data transmission) -->
  <g>
    <circle r="6" fill="#22D3EE" filter="url(#glow_final)">
      <animateMotion dur="5s" repeatCount="indefinite" path="M256,76 A180,180 0 1,1 255.9,76" />
    </circle>
    <circle r="10" fill="#22D3EE" opacity="0.2">
      <animateMotion dur="5s" repeatCount="indefinite" path="M256,76 A180,180 0 1,1 255.9,76" />
      <animate attributeName="r" values="8;14;8" dur="1s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Central Processing Node -->
  <circle cx="256" cy="256" r="10" fill="#22D3EE" filter="url(#glow_final)">
    <animate attributeName="r" values="10;12;10" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
