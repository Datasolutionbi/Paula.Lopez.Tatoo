<svg width="3840" height="2160" viewBox="0 0 3840 2160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg_grad" cx="50%" cy="50%" r="70%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D0D1F"/>
      <stop offset="100%" stop-color="#080813"/>
    </radialGradient>

    <!-- Synaptic Glow Filter -->
    <filter id="synaptic_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Atmospheric Orbs -->
    <radialGradient id="orb_blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb_cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Layer 0: Base -->
  <rect width="3840" height="2160" fill="url(#bg_grad)"/>

  <!-- Layer 1: Ambient Orbs -->
  <circle cx="400" cy="400" r="1200" fill="url(#orb_blue)"/>
  <circle cx="3440" cy="1760" r="1200" fill="url(#orb_cyan)"/>
  <circle cx="1920" cy="1080" r="800" fill="url(#orb_blue)" opacity="0.5"/>

  <!-- Layer 2: Neural Network Mesh (Static representation of our dynamic background) -->
  <g stroke="#3B82F6" stroke-width="1" stroke-opacity="0.15">
    <!-- Cluster 1 -->
    <line x1="500" y1="300" x2="800" y2="500" />
    <line x1="800" y1="500" x2="600" y2="800" />
    <line x1="600" y1="800" x2="300" y2="600" />
    <line x1="300" y1="600" x2="500" y2="300" />
    <line x1="500" y1="300" x2="600" y2="800" />
    
    <!-- Cluster 2 -->
    <line x1="3200" y1="400" x2="3500" y2="700" />
    <line x1="3500" y1="700" x2="3100" y2="900" />
    <line x1="3100" y1="900" x2="3200" y2="400" />

    <!-- Cluster 3 (Central Deep Network) -->
    <line x1="1920" y1="1080" x2="1600" y2="1400" />
    <line x1="1920" y1="1080" x2="2300" y2="1200" />
    <line x1="1920" y1="1080" x2="1800" y2="700" />
    <line x1="1600" y1="1400" x2="1300" y2="1100" />
    <line x1="2300" y1="1200" x2="2600" y2="1500" />
    
    <!-- Random Synapses -->
    <line x1="1000" y1="1800" x2="1400" y2="1600" />
    <line x1="2800" y1="200" x2="3000" y2="500" />
    <line x1="400" y1="1500" x2="700" y2="1300" />
  </g>

  <!-- Layer 3: Active Synaptic Nodes (Glow) -->
  <g fill="#22D3EE" filter="url(#synaptic_glow)">
    <circle cx="500" cy="300" r="6"/>
    <circle cx="800" cy="500" r="4"/>
    <circle cx="1920" cy="1080" r="8"/>
    <circle cx="3500" cy="700" r="5"/>
    <circle cx="1300" cy="1100" r="4"/>
    <circle cx="2600" cy="1500" r="6"/>
    <circle cx="1800" cy="700" r="3"/>
  </g>

  <!-- Layer 4: Subtle Watermark (Code Brackets) -->
  <text x="100" y="2000" fill="#3B82F6" opacity="0.05" style="font-family: monospace; font-size: 300px; font-weight: bold;">{</text>
  <text x="3500" y="2000" fill="#3B82F6" opacity="0.05" style="font-family: monospace; font-size: 300px; font-weight: bold;">}</text>

  <!-- Layer 5: Data Particles (Floating dust) -->
  <g fill="white" opacity="0.1">
    <circle cx="1000" cy="500" r="2"/>
    <circle cx="2500" cy="1500" r="1.5"/>
    <circle cx="3000" cy="800" r="2"/>
    <circle cx="500" cy="1800" r="1"/>
    <circle cx="3500" cy="200" r="2"/>
  </g>
</svg>
