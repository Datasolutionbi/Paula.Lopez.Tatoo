<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid Flat Background -->
  <rect width="512" height="512" fill="#080813"/>

  <!-- Centered Growth Symbol -->
  <!-- Center (256, 256), Scale 8x to fit nicely, Translation to center the 32x32 original viewBox -->
  <g transform="translate(256, 256) scale(8) translate(-16, -16)">
    <!-- Bar 1 (Smallest - Bold) -->
    <path d="M9 22V20" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Bar 2 (Medium - Bold) -->
    <path d="M16 22V15" stroke="#22D3EE" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Bar 3 (Largest - Bold) -->
    <path d="M23 22V10" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
