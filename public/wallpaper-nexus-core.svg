<svg width="3840" height="2160" viewBox="0 0 3840 2160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg_grad_core" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#080813"/>
    </radialGradient>
    <filter id="core_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="3840" height="2160" fill="url(#bg_grad_core)"/>

  <!-- Central Nervous System (Dense Core) -->
  <g stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.4">
    <!-- Center to Edges -->
    <line x1="1920" y1="1080" x2="1420" y2="580" /><line x1="1920" y1="1080" x2="2420" y2="580" />
    <line x1="1920" y1="1080" x2="1420" y2="1580" /><line x1="1920" y1="1080" x2="2420" y2="1580" />
    <line x1="1920" y1="1080" x2="1920" y2="380" /><line x1="1920" y1="1080" x2="1920" y2="1780" />
    <line x1="1920" y1="1080" x2="920" y2="1080" /><line x1="1920" y1="1080" x2="2920" y2="1080" />
  </g>

  <!-- High Density Hub -->
  <g fill="#22D3EE" filter="url(#core_glow)">
    <circle cx="1920" cy="1080" r="20"/>
    <circle cx="1420" cy="580" r="10"/><circle cx="2420" cy="580" r="10"/>
    <circle cx="1420" cy="1580" r="10"/><circle cx="2420" cy="1580" r="10"/>
    <circle cx="1920" cy="380" r="8"/><circle cx="1920" cy="1780" r="8"/>
    <circle cx="920" cy="1080" r="8"/><circle cx="2920" cy="1080" r="8"/>
  </g>

  <!-- Secondary Connections -->
  <g stroke="#3B82F6" stroke-width="0.5" stroke-opacity="0.2">
    <circle cx="1920" cy="1080" r="400" stroke-dasharray="10 20"/>
    <circle cx="1920" cy="1080" r="700" stroke-dasharray="5 15"/>
  </g>
</svg>
