<svg width="3840" height="2160" viewBox="0 0 3840 2160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grad_flow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080813"/>
      <stop offset="50%" stop-color="#0D0D1F"/>
      <stop offset="100%" stop-color="#080813"/>
    </linearGradient>
    <filter id="flow_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="3840" height="2160" fill="url(#bg_grad_flow)"/>

  <!-- Horizontal Neural Flows -->
  <g stroke="#3B82F6" stroke-width="1.5" stroke-opacity="0.3">
    <!-- Row 1 -->
    <path d="M0 540 Q 960 400, 1920 540 T 3840 540" fill="none" stroke-dasharray="20 40"/>
    <circle cx="960" cy="470" r="8" fill="#22D3EE" filter="url(#flow_glow)"/>
    <circle cx="2880" cy="540" r="6" fill="#3B82F6" opacity="0.6"/>

    <!-- Row 2 (Main Flow) -->
    <path d="M0 1080 Q 960 1200, 1920 1080 T 3840 1080" fill="none" stroke-width="2" stroke-opacity="0.5"/>
    <circle cx="1920" cy="1080" r="12" fill="#22D3EE" filter="url(#flow_glow)"/>
    <circle cx="500" cy="1120" r="5" fill="#3B82F6"/>
    <circle cx="3300" cy="1020" r="5" fill="#3B82F6"/>

    <!-- Row 3 -->
    <path d="M0 1620 Q 960 1400, 1920 1620 T 3840 1620" fill="none" stroke-dasharray="10 30"/>
    <circle cx="1400" cy="1510" r="7" fill="#22D3EE" opacity="0.8"/>
    <circle cx="2400" cy="1620" r="10" fill="#22D3EE" filter="url(#flow_glow)"/>
  </g>

  <!-- Floating Data Particles -->
  <g fill="white" opacity="0.05">
    <circle cx="1000" cy="200" r="2"/><circle cx="2000" cy="1800" r="3"/><circle cx="3000" cy="400" r="2"/>
    <circle cx="500" cy="1500" r="4"/><circle cx="3500" cy="1000" r="2"/>
  </g>
</svg>
