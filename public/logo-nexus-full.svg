<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Decor -->
  <circle cx="256" cy="256" r="240" fill="#080813" />
  
  <!-- Glassmorphism Ring -->
  <rect x="128" y="128" width="256" height="256" rx="40" transform="rotate(45 256 256)" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.3" />
  <rect x="135" y="135" width="242" height="242" rx="38" transform="rotate(45 256 256)" stroke="url(#paint0_linear)" stroke-width="8" />

  <!-- Data Bars -->
  <path d="M180 340V260" stroke="#3B82F6" stroke-width="24" stroke-linecap="round">
    <animate attributeName="d" values="M180 340V260;M180 340V200;M180 340V260" dur="2s" repeatCount="indefinite" />
  </path>
  <path d="M256 340V160" stroke="#22D3EE" stroke-width="24" stroke-linecap="round">
    <animate attributeName="d" values="M256 340V160;M256 340V220;M256 340V160" dur="2.5s" repeatCount="indefinite" />
  </path>
  <path d="M332 340V290" stroke="#3B82F6" stroke-width="24" stroke-linecap="round">
    <animate attributeName="d" values="M332 340V290;M332 340V210;M332 340V290" dur="1.8s" repeatCount="indefinite" />
  </path>

  <!-- Neural Orbital -->
  <circle cx="256" cy="256" r="180" stroke="white" stroke-opacity="0.05" stroke-width="2" stroke-dasharray="10 20" />
  
  <!-- Photon -->
  <circle r="8" fill="#22D3EE">
    <animateMotion dur="4s" repeatCount="indefinite" path="M256,76 A180,180 0 1,1 255.9,76" />
    <circle r="12" fill="#22D3EE" opacity="0.3">
        <animate attributeName="r" values="8;16;8" dur="1s" repeatCount="indefinite" />
    </circle>
  </circle>

  <!-- Central Node -->
  <circle cx="256" cy="256" r="12" fill="#22D3EE">
    <animate attributeName="r" values="12;15;12" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- AndresBI Text -->
  <text x="256" y="460" text-anchor="middle" fill="white" style="font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 48px; letter-spacing: 0.1em;">
    ANDRES<tspan fill="#FACC15">BI</tspan>_
  </text>

  <defs>
    <linearGradient id="paint0_linear" x1="128" y1="128" x2="384" y2="384" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6" stop-opacity="0.5" />
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0.2" />
    </linearGradient>
  </defs>
</svg>
